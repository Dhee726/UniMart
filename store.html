<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Store | UniMart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="brand-logo">UniMart.</a>
            <div class="nav-actions"><button class="icon-btn" id="theme-toggle"><i class="fa-regular fa-moon"></i></button><a href="index.html" class="btn btn-outline">Back</a></div>
        </div>
    </nav>
    <main class="main-content">
        <div id="store-header-container"></div>
        <section class="product-grid" id="store-product-grid"></section>
    </main>
    <footer class="footer">
        <div class="footer-content">
            <p style="color: var(--text-muted); font-size: 0.875rem;">© 2026 UniMart. All rights reserved.</p>
            <div class="footer-links"><a href="#" class="report-btn" onclick="openReportModal(event)"><i class="fa-solid fa-flag"></i> Report this Store</a></div>
        </div>
    </footer>
    <div id="toast-container" class="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
