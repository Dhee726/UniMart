<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | UniMart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar"><div class="nav-container" style="justify-content: center;"><a href="index.html" class="brand-logo">UniMart.</a></div></nav>

    <main class="main-content" style="display: flex; align-items: center; justify-content: center;">
        <div class="form-container" style="width: 100%;">
            <div style="text-align: center; margin-bottom: 2rem;"><h1 style="font-size: 1.5rem; font-weight: 700;">Welcome Back!</h1></div>
            <form id="login-form">
                <div class="form-group"><label class="form-label">Email</label><div class="input-icon-wrapper"><i class="fa-regular fa-envelope"></i><input type="email" id="login-email" class="form-control" required></div></div>
                <div class="form-group" style="margin-bottom: 2rem;"><label class="form-label">Password</label><div class="input-icon-wrapper"><i class="fa-solid fa-lock"></i><input type="password" id="login-password" class="form-control" required></div></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Log In</button>
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">Don't have an account? <a href="signup.html" style="color: var(--primary);">Sign up</a></p>
            </form>
        </div>
    </main>

    <footer class="footer"><div class="footer-content"><p style="color: var(--text-muted); font-size: 0.875rem;">© 2026 UniMart. All rights reserved.</p></div></footer>
    <div id="toast-container" class="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
