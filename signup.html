<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | UniMart</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar"><div class="nav-container" style="justify-content: center;"><a href="index.html" class="brand-logo">UniMart.</a></div></nav>

    <main class="main-content" style="display: flex; align-items: center; justify-content: center;">
        <div class="form-container" style="width: 100%;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h1 style="font-size: 1.5rem; font-weight: 700;">Join the Community</h1>
            </div>
            <form id="signup-form">
                <div class="role-selector">
                    <div class="role-card active" data-role="buyer"><i class="fa-solid fa-bag-shopping"></i><p>I want to Buy</p></div>
                    <div class="role-card" data-role="seller"><i class="fa-solid fa-shop"></i><p>I want to Sell</p></div>
                </div>
                <input type="hidden" id="signup-role" value="buyer">
                <div class="form-group"><label class="form-label">Full Name</label><div class="input-icon-wrapper"><i class="fa-regular fa-user"></i><input type="text" id="signup-name" class="form-control" required></div></div>
                <div class="form-group"><label class="form-label">Gmail</label><div class="input-icon-wrapper"><i class="fa-regular fa-envelope"></i><input type="email" id="signup-email" class="form-control" required></div></div>
                <div class="form-group"><label class="form-label">Phone</label><div class="input-icon-wrapper"><i class="fa-brands fa-whatsapp"></i><input type="tel" id="signup-phone" class="form-control" required></div></div>
                <div class="form-group" style="margin-bottom: 2rem;"><label class="form-label">Password</label><div class="input-icon-wrapper"><i class="fa-solid fa-lock"></i><input type="password" id="signup-password" class="form-control" required></div></div>
                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem;">Create Account</button>
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.875rem;">Already have an account? <a href="login.html" style="color: var(--primary);">Log in</a></p>
            </form>
        </div>
    </main>

    <footer class="footer"><div class="footer-content"><p style="color: var(--text-muted); font-size: 0.875rem;">© 2026 UniMart. All rights reserved.</p></div></footer>
    <div id="toast-container" class="toast-container"></div>
    <script src="app.js"></script>
</body>
</html>
